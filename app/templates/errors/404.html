{% extends "base.html" %}
{% block title %}404 Not Found{% endblock %}
{% block content %}
<section class="section">
  <div class="container" style="text-align:center; padding: var(--space-24) var(--space-4)">
    <div class="error-code">404</div>
    <h1 style="margin-bottom: var(--space-4)">Page Not Found</h1>
    <p style="color: var(--color-text-muted); margin-bottom: var(--space-8)">
      {{ message or "The page you are looking for does not exist." }}
    </p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">Back to Home</a>
  </div>
</section>
{% endblock %}
