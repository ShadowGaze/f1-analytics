{% extends "base.html" %}
{% block title %}500 Server Error{% endblock %}
{% block content %}
<section class="section">
  <div class="container" style="text-align:center; padding: var(--space-24) var(--space-4)">
    <div class="error-code">500</div>
    <h1 style="margin-bottom: var(--space-4)">Server Error</h1>
    <p style="color: var(--color-text-muted); margin-bottom: var(--space-8)">
      Something went wrong. Please try again later.
    </p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">Back to Home</a>
  </div>
</section>
{% endblock %}
