services:
  - type: web
    name: f1-analytics
    runtime: python
    buildCommand: pip install -r requirements.txt && python load_from_csv.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.14.3
    plan: free